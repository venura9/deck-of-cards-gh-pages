name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Build & Deploy
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── Cloudflare DNS – idempotent CNAME upsert ──────────────
      - name: Upsert Cloudflare DNS CNAME record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_SUBDOMAIN: music.yumethathukorala.com
          CF_TARGET: venura9.github.io
        run: |
          set -euo pipefail

          echo "Looking up existing CNAME record for ${CF_SUBDOMAIN} …"
          EXISTING=$(curl -sSf \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${CF_SUBDOMAIN}")

          RECORD_ID=$(echo "${EXISTING}" | jq -r '.result[0].id // empty')

          PAYLOAD=$(jq -n \
            --arg name "${CF_SUBDOMAIN}" \
            --arg content "${CF_TARGET}" \
            '{type:"CNAME", name:$name, content:$content, ttl:1, proxied:false}')

          if [ -n "${RECORD_ID}" ]; then
            echo "Updating existing record (id: ${RECORD_ID}) …"
            curl -sSf -X PUT \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -d "${PAYLOAD}"
          else
            echo "Creating new CNAME record …"
            curl -sSf -X POST \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -d "${PAYLOAD}"
          fi
          echo "DNS step complete."

      # ── Deploy dist/ to gh-pages branch ───────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: music.yumethathukorala.com
          force_orphan: true

